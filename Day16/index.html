<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management - Spring Flowers School</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        font-family: Arial, sans-serif;
    }

    /* Flexbox layout */
    .main-container {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    .content {
        flex: 1;
        padding: 20px;
    }

    .timetable {
        display: none;
    }

    footer {
        background-color: #343a40;
        color: white;
        text-align: center;
        padding: 10px;
    }
</style>
</head>

<body>

<div class="main-container">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Spring Flowers School</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <button class="btn btn-light" onclick="showTimeTable()">TimeTable</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Content -->
<div class="content container">

    <div id="homeSection">
        <h2>Welcome Student</h2>
        <p>This is your online school application.</p>
    </div>

    <div id="timeTableSection" class="timetable">
        <h3 class="text-center mb-3">Student Time Table</h3>

        <div class="table-responsive">
            <table class="table table-bordered table-striped text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Day</th>
                        <th>9-10</th>
                        <th>10-11</th>
                        <th>11-12</th>
                        <th>12-1</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Monday</td>
                        <td>Math</td>
                        <td>English</td>
                        <td>Science</td>
                        <td>Computer</td>
                    </tr>
                    <tr>
                        <td>Tuesday</td>
                        <td>Physics</td>
                        <td>Chemistry</td>
                        <td>Biology</td>
                        <td>Sports</td>
                    </tr>
                    <tr>
                        <td>Wednesday</td>
                        <td>History</td>
                        <td>Geography</td>
                        <td>Math</td>
                        <td>Art</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>

<footer>
    © 2026 Spring Flowers School
</footer>

</div>

<script>
function showTimeTable() {
    document.getElementById("homeSection").style.display = "none";
    document.getElementById("timeTableSection").style.display = "block";
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
